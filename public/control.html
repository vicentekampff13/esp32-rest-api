<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
background:#0d1117;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
gap:30px;
box-sizing:border-box;
}

.video-wrap{
width:90vw;
max-width:700px;
display:flex;
justify-content:center;
}

#cam{
width:100%;
max-height:420px;
background:black;
border-radius:12px;
border:2px solid #00d9ff;
box-shadow:0 0 20px rgba(0,217,255,.35);
}

.pad{
width:300px;
height:300px;
border-radius:50%;
border:4px solid #00d9ff;
position:relative;
box-shadow:0 0 20px #00d9ff;
}

button{
position:absolute;
width:80px;
height:80px;
border-radius:50%;
border:none;
background:#161b22;
color:white;
font-size:30px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
}

.up{
top:10px;
left:50%;
transform:translateX(-50%);
}

.down{
bottom:10px;
left:50%;
transform:translateX(-50%);
}

.left{
left:10px;
top:50%;
transform:translateY(-50%);
}

.right{
right:10px;
top:50%;
transform:translateY(-50%);
}

.center{
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#ffb703;
color:black;
font-size:22px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="video-wrap">
  <video id="cam" controls autoplay muted playsinline>
    <source src="http://192.168.1.120:8888/cam1/index.m3u8" type="application/x-mpegURL">
  </video>
</div>

<div class="pad">
  <button class="up">↑</button>
  <button class="down">↓</button>
  <button class="left">←</button>
  <button class="right">→</button>
  <button class="center">●</button>
</div>

<script>

const API="https://esp32-rest-api-1-wvw5.onrender.com/command"
const TOKEN="12345"

let interval=null

function send(cmd){
  fetch(API,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+TOKEN
    },
    body:JSON.stringify({command:cmd})
  })
}

function start(cmd){
  send(cmd)
  interval=setInterval(()=>{
    send(cmd)
  },100)
}

function stop(){
  clearInterval(interval)
  send("stop")
}

document.querySelector(".up").onpointerdown=()=>start("up")
document.querySelector(".down").onpointerdown=()=>start("down")
document.querySelector(".left").onpointerdown=()=>start("left")
document.querySelector(".right").onpointerdown=()=>start("right")
document.querySelector(".center").onclick=()=>send("led_toggle")

document.querySelectorAll(".up, .down, .left, .right").forEach(btn=>{
  btn.onpointerup=stop
  btn.onpointerleave=stop
})

</script>

</body>
</html>
